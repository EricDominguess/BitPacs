# Mapeamento de unidade pelo cookie (definido pelo frontend antes de abrir o OHIF)
map $cookie_orthanc_unit $orthanc_ip_by_cookie {
    default                 "";
    "riobranco"             "http://10.31.0.36:8042";
    "foziguacu"             "http://10.31.0.39:8042";
    "fazenda"               "http://10.31.0.38:8042";
    "faxinal"               "http://10.31.0.37:8042";
    "santamariana"          "http://10.31.0.46:8042";
    "guarapuava"            "http://10.31.0.47:8042";
    "carlopolis"            "http://10.31.0.48:8042";
    "arapoti"               "http://10.31.0.49:8042";
}

# Fallback: Mapeamento pelo referer (caso o cookie não esteja presente)
map $http_referer $orthanc_ip_by_referer {
    default                 "http://10.31.0.36:8042";
    "~*orthanc-riobranco"   "http://10.31.0.36:8042";
    "~*orthanc-foziguacu"   "http://10.31.0.39:8042";
    "~*orthanc-fazenda"     "http://10.31.0.38:8042";
    "~*orthanc-faxinal"     "http://10.31.0.37:8042";
    "~*orthanc-santamariana" "http://10.31.0.46:8042";
    "~*orthanc-guarapuava"  "http://10.31.0.47:8042";
    "~*orthanc-carlopolis"  "http://10.31.0.48:8042";
    "~*orthanc-arapoti"     "http://10.31.0.49:8042";
}

# Combina cookie (prioridade) com referer (fallback)
map $orthanc_ip_by_cookie $orthanc_ip {
    ""      $orthanc_ip_by_referer;
    default $orthanc_ip_by_cookie;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. API do Backend
    location /api/ {
        proxy_pass http://bitpacs-backend:5151/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 1.1. Avatares dos usuários (arquivos estáticos do backend)
    location /avatars/ {
        proxy_pass http://bitpacs-backend:5151/avatars/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Roteamento Supremo das Unidades (O ^~ garante prioridade absoluta)
    # Configuração completa com headers necessários para OHIF/DICOM
    location ^~ /orthanc-riobranco/ {
        rewrite ^/orthanc-riobranco/(.*) /$1 break;
        proxy_pass http://10.31.0.36:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-foziguacu/ {
        rewrite ^/orthanc-foziguacu/(.*) /$1 break;
        proxy_pass http://10.31.0.39:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-fazenda/ {
        rewrite ^/orthanc-fazenda/(.*) /$1 break;
        proxy_pass http://10.31.0.38:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-faxinal/ {
        rewrite ^/orthanc-faxinal/(.*) /$1 break;
        proxy_pass http://10.31.0.37:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-santamariana/ {
        rewrite ^/orthanc-santamariana/(.*) /$1 break;
        proxy_pass http://10.31.0.46:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-guarapuava/ {
        rewrite ^/orthanc-guarapuava/(.*) /$1 break;
        proxy_pass http://10.31.0.47:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-carlopolis/ {
        rewrite ^/orthanc-carlopolis/(.*) /$1 break;
        proxy_pass http://10.31.0.48:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
    
    location ^~ /orthanc-arapoti/ {
        rewrite ^/orthanc-arapoti/(.*) /$1 break;
        proxy_pass http://10.31.0.49:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # 3. Proteção para APIs do OHIF/Stone Viewer que tentam escapar para a raiz
    # Essas requisições vêm do iframe do OHIF e usam o cookie/referer para determinar o Orthanc correto
    location ~ ^/(series|instances|dicom-web|wado|plugins|system|tools|patients|studies|modalities|peers|queries|changes|exports|jobs|statistics)(/|$) {
        # Header de debug para ver qual Orthanc está sendo usado
        add_header X-Orthanc-Target $orthanc_ip always;
        add_header X-Cookie-Unit $cookie_orthanc_unit always;
        
        proxy_pass $orthanc_ip;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # 4. O Site React (Deve ficar por último)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
