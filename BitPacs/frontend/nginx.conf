# 1. Tenta descobrir a clínica pelo Cookie (Prioridade Máxima)
map $cookie_orthanc_unit $orthanc_ip_by_cookie {
    default                 "";
    "riobranco"             "http://10.31.0.36:8042";
    "foziguacu"             "http://10.31.0.39:8042";
    "fazenda"               "http://10.31.0.38:8042";
    "faxinal"               "http://10.31.0.37:8042";
    "santamariana"          "http://10.31.0.46:8042";
    "guarapuava"            "http://10.31.0.47:8042";
    "carlopolis"            "http://10.31.0.48:8042";
    "arapoti"               "http://10.31.0.49:8042";
}

# 2. Fallback pelo referer antigo (caso falte cookie)
map $http_referer $orthanc_ip_by_referer {
    default                 "http://10.31.0.36:8042";
    "~*/orthanc-riobranco"  "http://10.31.0.36:8042";
    "~*/orthanc-foziguacu"  "http://10.31.0.39:8042";
    "~*/orthanc-fazenda"    "http://10.31.0.38:8042";
    "~*/orthanc-faxinal"    "http://10.31.0.37:8042";
    "~*/orthanc-santamariana" "http://10.31.0.46:8042";
    "~*/orthanc-guarapuava" "http://10.31.0.47:8042";
    "~*/orthanc-carlopolis" "http://10.31.0.48:8042";
    "~*/orthanc-arapoti"    "http://10.31.0.49:8042";
}

# 3. Combina os dois e define o IP final
map $orthanc_ip_by_cookie $orthanc_ip {
    ""      $orthanc_ip_by_referer;
    default $orthanc_ip_by_cookie;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Evita index.html antigo em cache (causa erro de import dinâmico com chunk hash antigo)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Chunks com hash podem ser cacheados por longo período
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # 1. API do Backend
    location /api/ {
        proxy_pass http://bitpacs-backend:5151/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Roteamento Supremo das Unidades (O ^~ garante prioridade absoluta)
    location ^~ /orthanc-riobranco/ { rewrite ^/orthanc-riobranco/(.*) /$1 break; proxy_pass http://10.31.0.36:8042; }
    location ^~ /orthanc-foziguacu/ { rewrite ^/orthanc-foziguacu/(.*) /$1 break; proxy_pass http://10.31.0.39:8042; }
    location ^~ /orthanc-fazenda/   { rewrite ^/orthanc-fazenda/(.*) /$1 break; proxy_pass http://10.31.0.38:8042; }
    location ^~ /orthanc-faxinal/   { rewrite ^/orthanc-faxinal/(.*) /$1 break; proxy_pass http://10.31.0.37:8042; }
    location ^~ /orthanc-santamariana/ { rewrite ^/orthanc-santamariana/(.*) /$1 break; proxy_pass http://10.31.0.46:8042; }
    location ^~ /orthanc-guarapuava/ { rewrite ^/orthanc-guarapuava/(.*) /$1 break; proxy_pass http://10.31.0.47:8042; }
    location ^~ /orthanc-carlopolis/ { rewrite ^/orthanc-carlopolis/(.*) /$1 break; proxy_pass http://10.31.0.48:8042; }
    location ^~ /orthanc-arapoti/   { rewrite ^/orthanc-arapoti/(.*) /$1 break; proxy_pass http://10.31.0.49:8042; }

    # 3. Proteção para APIs do Stone Viewer que tentam escapar para a raiz
    location ~ ^/(ohif|series|instances|dicom-web|wado|plugins|system|tools)(/|$) {
        proxy_pass $orthanc_ip;
        proxy_set_header Host $host;
    }

    # 4. O Site React (Deve ficar por último como Fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}